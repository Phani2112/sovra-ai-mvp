<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sovra AI – In-Car Assistant Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      color: #e2e8f0;
      line-height: 1.6;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: linear-gradient(135deg, #1e40af 0%, #0c4a6e 50%, #0f172a 100%);
      padding: 1.5rem 2rem;
      text-align: center;
      border-bottom: 2px solid #3b82f6;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
    }

    header h1 {
      font-size: 1.8rem;
      color: #e0f2fe;
      margin-bottom: 0.5rem;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }

    header p {
      color: #bae6fd;
      font-size: 0.95rem;
      font-weight: 500;
    }

    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 900px;
      margin: 1rem auto;
      width: 100%;
      padding: 0 1rem;
      gap: 1rem;
      min-height: 0;
    }

    #messages {
      flex: 1;
      background: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(59, 130, 246, 0.2);
      border-radius: 12px;
      padding: 1.5rem;
      overflow-y: auto;
      overflow-x: hidden;
      scroll-behavior: smooth;
      min-height: 0;
    }

    #messages::-webkit-scrollbar {
      width: 8px;
    }

    #messages::-webkit-scrollbar-track {
      background: rgba(30, 41, 59, 0.4);
      border-radius: 10px;
    }

    #messages::-webkit-scrollbar-thumb {
      background: rgba(59, 130, 246, 0.5);
      border-radius: 10px;
    }

    #messages::-webkit-scrollbar-thumb:hover {
      background: rgba(59, 130, 246, 0.7);
    }

    .message {
      margin-bottom: 1rem;
      padding: 1rem;
      border-radius: 8px;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      background: rgba(59, 130, 246, 0.2);
      border-left: 4px solid #3b82f6;
      text-align: right;
      margin-left: 2rem;
    }

    .message.user strong {
      color: #60a5fa;
    }

    .message.user p {
      color: #e2e8f0;
    }

    .message.assistant {
      background: rgba(34, 197, 94, 0.1);
      border-left: 4px solid #22c55e;
      margin-right: 2rem;
    }

    .message.assistant strong {
      color: #4ade80;
    }

    .message.assistant p {
      color: #cbd5e1;
    }

    .message.error {
      background: rgba(239, 68, 68, 0.1);
      border-left: 4px solid #ef4444;
      color: #fca5a5;
    }

    .message.error strong {
      color: #fca5a5;
    }

    #chat-form {
      display: flex;
      gap: 1rem;
      background: rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(59, 130, 246, 0.2);
      padding: 1rem;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    #input {
      flex: 1;
      padding: 0.75rem 1.25rem;
      background: rgba(15, 23, 42, 0.6);
      border: 2px solid rgba(59, 130, 246, 0.3);
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 1rem;
      font-family: inherit;
      transition: all 0.3s ease;
    }

    #input:focus {
      outline: none;
      border-color: #3b82f6;
      background: rgba(15, 23, 42, 0.9);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    #input::placeholder {
      color: #64748b;
    }

    button[type="submit"] {
      padding: 0.75rem 2rem;
      background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
      color: white;
      border: 2px solid #3b82f6;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }

    button[type="submit"]:hover {
      background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5);
      transform: translateY(-2px);
    }

    button[type="submit"]:active {
      transform: translateY(0);
    }

    button[type="submit"]:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    @media (max-width: 768px) {
      .chat-container {
        margin: 1rem auto;
        padding: 0 0.5rem;
      }

      header h1 {
        font-size: 1.4rem;
      }

      .message.user {
        margin-left: 1rem;
      }

      .message.assistant {
        margin-right: 1rem;
      }

      #chat-form {
        flex-direction: column;
      }

      button[type="submit"] {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Sovra AI – Local In-Car Assistant</h1>
    <p>Running locally · No cloud API · Powered by llama.cpp</p>
  </header>

  <div class="chat-container">
    <div id="messages"></div>
    <form id="chat-form">
      <input id="input" type="text" placeholder="Ask a question..." required>
      <button type="submit">Send</button>
    </form>
  </div>

  <script>
    const form = document.getElementById("chat-form");
    const input = document.getElementById("input");
    const messages = document.getElementById("messages");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;

      // Add user message
      const userMsg = document.createElement("div");
      userMsg.className = "message user";
      userMsg.innerHTML = `<p><strong>You:</strong> ${escapeHtml(text)}</p>`;
      messages.appendChild(userMsg);

      input.value = "";
      messages.scrollTop = messages.scrollHeight;

      try {
        const res = await fetch("http://127.0.0.1:8000/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text })
        });
        const data = await res.json();

        // Add assistant message
        const assistantMsg = document.createElement("div");
        assistantMsg.className = "message assistant";
        assistantMsg.innerHTML = `<p><strong>Sovra:</strong> ${escapeHtml(data.reply)}</p>`;
        messages.appendChild(assistantMsg);
      } catch (err) {
        // Add error message
        const errorMsg = document.createElement("div");
        errorMsg.className = "message error";
        errorMsg.innerHTML = `<p><strong>Error:</strong> ${escapeHtml(err.message)}</p>`;
        messages.appendChild(errorMsg);
      }

      messages.scrollTop = messages.scrollHeight;
    });

    // Escape HTML to prevent XSS
    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
